version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aria-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aria_secure_password_2024}
      POSTGRES_DB: ${POSTGRES_DB:-aria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/backups:/backups
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aria}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aria-network

  redis:
    image: redis:7-alpine
    container_name: aria-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aria-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aria-backend
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-aria}:${POSTGRES_PASSWORD:-aria_secure_password_2024}@postgres:5432/${POSTGRES_DB:-aria_db}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-CHANGE_THIS_IN_PRODUCTION_LONG_SECURE_KEY_MIN_32_CHARS}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      
      # AI Services
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      
      # Application
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:12000,http://localhost:12001,https://work-1-rkasyntaaioiwqjt.prod-runtime.all-hands.dev,https://work-2-rkasyntaaioiwqjt.prod-runtime.all-hands.dev}
      
      # Features
      ENABLE_BOTS: ${ENABLE_BOTS:-true}
      ENABLE_OCR: ${ENABLE_OCR:-true}
      ENABLE_ANALYTICS: ${ENABLE_ANALYTICS:-true}
      
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - aria-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aria-frontend
    ports:
      - "${FRONTEND_PORT:-12000}:12000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - aria-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  aria-network:
    driver: bridge
