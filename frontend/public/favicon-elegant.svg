<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>
  
  <!-- Border -->
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Letter A -->
  <path d="M 32 18 L 44 48 L 39 48 L 36.5 41 L 27.5 41 L 25 48 L 20 48 Z" 
        fill="url(#accentGrad)"/>
  
  <!-- Cross bar -->
  <rect x="29" y="35" width="6" height="2" fill="url(#goldGrad)" rx="0.5"/>
  
  <!-- Inner triangle -->
  <path d="M 32 24 L 35 32 L 29 32 Z" fill="url(#bgGrad)" opacity="0.4"/>
  
  <!-- Circuit dots -->
  <circle cx="32" cy="15" r="1" fill="url(#accentGrad)" opacity="0.8"/>
  <circle cx="26" cy="17" r="0.7" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="38" cy="17" r="0.7" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
