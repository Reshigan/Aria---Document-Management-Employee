<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" opacity="0.95"/>
  
  <!-- Outer Ring (Premium Touch) -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Letter A - Elegant Geometric Design -->
  <g filter="url(#glow)">
    <!-- Main A Structure -->
    <path d="M 256 140 L 340 360 L 310 360 L 293 320 L 219 320 L 202 360 L 172 360 Z" 
          fill="url(#accentGradient)" 
          stroke="none"/>
    
    <!-- Cross bar with gradient -->
    <rect x="230" y="270" width="52" height="16" 
          fill="url(#goldGradient)" 
          rx="2"/>
    
    <!-- Inner Triangle (negative space) -->
    <path d="M 256 180 L 280 240 L 232 240 Z" 
          fill="url(#bgGradient)" 
          opacity="0.4"/>
    
    <!-- Digital/AI Circuit Lines -->
    <g opacity="0.7" stroke="url(#accentGradient)" stroke-width="2" fill="none">
      <!-- Top Circuit Lines -->
      <path d="M 256 140 L 256 120 M 246 145 L 230 130 M 266 145 L 282 130"/>
      <circle cx="256" cy="120" r="4" fill="url(#accentGradient)"/>
      <circle cx="230" cy="130" r="3" fill="url(#accentGradient)"/>
      <circle cx="282" cy="130" r="3" fill="url(#accentGradient)"/>
      
      <!-- Side Circuit Lines -->
      <path d="M 175 340 L 155 340 M 155 340 L 155 320"/>
      <path d="M 337 340 L 357 340 M 357 340 L 357 320"/>
      <circle cx="155" cy="320" r="3" fill="url(#accentGradient)"/>
      <circle cx="357" cy="320" r="3" fill="url(#accentGradient)"/>
    </g>
    
    <!-- Document/Twin Lines (subtle) -->
    <g opacity="0.5" stroke="url(#goldGradient)" stroke-width="1.5" fill="none">
      <path d="M 200 380 L 200 395 L 240 395"/>
      <path d="M 272 395 L 312 395 L 312 380"/>
      <line x1="210" y1="388" x2="230" y2="388"/>
      <line x1="282" y1="388" x2="302" y2="388"/>
    </g>
  </g>
  
  <!-- Bottom Text Label -->
  <g opacity="0.8">
    <text x="256" y="430" 
          font-family="Arial, sans-serif" 
          font-size="28" 
          font-weight="600" 
          fill="url(#accentGradient)" 
          text-anchor="middle"
          letter-spacing="6">ARIA</text>
    <text x="256" y="450" 
          font-family="Arial, sans-serif" 
          font-size="12" 
          font-weight="300" 
          fill="#76d7c4" 
          text-anchor="middle"
          letter-spacing="3">DIGITAL TWIN</text>
  </g>
  
  <!-- Decorative Corner Elements (Corporate Touch) -->
  <g opacity="0.3" stroke="url(#goldGradient)" stroke-width="2" fill="none">
    <path d="M 60 60 L 80 60 L 80 80"/>
    <path d="M 452 60 L 432 60 L 432 80"/>
    <path d="M 60 452 L 80 452 L 80 432"/>
    <path d="M 452 452 L 432 452 L 432 432"/>
  </g>
</svg>
