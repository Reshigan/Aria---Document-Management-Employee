<svg width="180" height="60" viewBox="0 0 180 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Corporate Elegant ARIA Logo -->
  <!-- Background Glow -->
  <defs>
    <linearGradient id="ariaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon - Elegant A with Document -->
  <g transform="translate(10, 10)">
    <!-- Main A Shape -->
    <path d="M 20 40 L 27 10 L 34 40 M 23 28 L 31 28" 
          stroke="url(#ariaGradient)" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"
          filter="url(#glow)"/>
    
    <!-- Document Pages -->
    <rect x="12" y="15" width="16" height="22" rx="2" 
          fill="url(#ariaGradient)" 
          opacity="0.15"/>
    <rect x="14" y="17" width="14" height="20" rx="2" 
          fill="none" 
          stroke="url(#ariaGradient)" 
          stroke-width="1.5"
          opacity="0.6"/>
    
    <!-- AI Spark -->
    <circle cx="37" cy="12" r="2" fill="#0891b2" opacity="0.8"/>
    <circle cx="40" cy="15" r="1.5" fill="#2563eb" opacity="0.6"/>
    <circle cx="34" cy="15" r="1.2" fill="#1a365d" opacity="0.7"/>
  </g>
  
  <!-- Text - ARIA -->
  <g transform="translate(58, 30)">
    <text x="0" y="0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="26" font-weight="700" fill="url(#textGradient)" letter-spacing="2">
      ARIA
    </text>
    <text x="0" y="14" font-family="system-ui, -apple-system, sans-serif" 
          font-size="9" font-weight="500" fill="#6b7280" letter-spacing="3">
      DOCUMENT MANAGEMENT
    </text>
  </g>
</svg>
