<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corporateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0059b3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#corporateGradient)"/>
  
  <!-- Document Stack Icon -->
  <g transform="translate(16, 14)">
    <!-- Back Document -->
    <rect x="6" y="4" width="24" height="30" rx="2" fill="#ffffff" opacity="0.3"/>
    
    <!-- Middle Document -->
    <rect x="3" y="2" width="24" height="30" rx="2" fill="#ffffff" opacity="0.6"/>
    
    <!-- Front Document -->
    <rect x="0" y="0" width="24" height="30" rx="2" fill="#ffffff"/>
    
    <!-- Document Lines -->
    <line x1="4" y1="6" x2="20" y2="6" stroke="#003d82" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="10" x2="20" y2="10" stroke="#003d82" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="14" x2="16" y2="14" stroke="#0288d1" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- AI Spark -->
    <circle cx="18" cy="22" r="5" fill="#0288d1"/>
    <path d="M18 19 L18 25 M15 22 L21 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
