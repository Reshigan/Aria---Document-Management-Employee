<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Elegant ARIA Favicon -->
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="28" fill="url(#faviconGradient)" filter="url(#shadow)"/>
  
  <!-- Main A Shape - Bold and Elegant -->
  <g transform="translate(32, 32)">
    <path d="M -10 12 L 0 -14 L 10 12 M -6 4 L 6 4" 
          stroke="#ffffff" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Document Accent -->
    <rect x="-12" y="-6" width="10" height="14" rx="1.5" 
          fill="#ffffff" 
          opacity="0.2"/>
    
    <!-- AI Spark -->
    <circle cx="12" cy="-10" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="9" cy="-7" r="1.5" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
