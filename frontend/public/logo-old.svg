<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003d82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0059b3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(5, 10)">
    <rect x="0" y="0" width="35" height="40" rx="4" fill="url(#logoGradient)"/>
    
    <!-- Document representation -->
    <rect x="8" y="8" width="19" height="2" rx="1" fill="#ffffff" opacity="0.9"/>
    <rect x="8" y="14" width="19" height="2" rx="1" fill="#ffffff" opacity="0.9"/>
    <rect x="8" y="20" width="14" height="2" rx="1" fill="#ffffff" opacity="0.7"/>
    
    <!-- AI Symbol -->
    <circle cx="24" cy="30" r="6" fill="#0288d1"/>
    <text x="24" y="34" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">AI</text>
  </g>
  
  <!-- ARIA Text -->
  <text x="55" y="38" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="url(#logoGradient)">ARIA</text>
  
  <!-- Subtitle -->
  <text x="55" y="52" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" fill="#4a5568">Document Intelligence</text>
</svg>
