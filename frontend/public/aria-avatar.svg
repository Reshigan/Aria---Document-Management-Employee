<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d82;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0059b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#avatarGradient)"/>
  
  <!-- Document Stack -->
  <g transform="translate(25, 20)">
    <!-- Back Document -->
    <rect x="10" y="8" width="36" height="48" rx="3" fill="#ffffff" opacity="0.3"/>
    
    <!-- Middle Document -->
    <rect x="5" y="4" width="36" height="48" rx="3" fill="#ffffff" opacity="0.6"/>
    
    <!-- Front Document -->
    <rect x="0" y="0" width="36" height="48" rx="3" fill="#ffffff"/>
    
    <!-- Document Content Lines -->
    <line x1="6" y1="10" x2="30" y2="10" stroke="#003d82" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="30" y2="16" stroke="#003d82" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="22" x2="24" y2="22" stroke="#0288d1" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="28" x2="28" y2="28" stroke="#0288d1" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- AI Badge -->
    <circle cx="28" cy="36" r="8" fill="#0288d1"/>
    <path d="M28 31 L28 41 M23 36 L33 36" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
