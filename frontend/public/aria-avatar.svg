<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#722ed1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13c2c2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f5ff;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowEffect">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1890ff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#avatarBg)"/>
  
  <!-- Glow Effect -->
  <circle cx="100" cy="100" r="90" fill="url(#glowEffect)" opacity="0.3"/>
  
  <!-- Head Circle -->
  <circle cx="100" cy="90" r="50" fill="url(#faceGradient)"/>
  
  <!-- Face Features - Minimalist AI Design -->
  
  <!-- Eyes - Glowing Digital Eyes -->
  <ellipse cx="85" cy="85" rx="8" ry="10" fill="#1890ff"/>
  <ellipse cx="115" cy="85" rx="8" ry="10" fill="#1890ff"/>
  
  <!-- Eye Highlights -->
  <circle cx="87" cy="83" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="117" cy="83" r="3" fill="#ffffff" opacity="0.8"/>
  
  <!-- Digital Eye Glow -->
  <ellipse cx="85" cy="85" rx="10" ry="12" fill="#13c2c2" opacity="0.2"/>
  <ellipse cx="115" cy="85" rx="10" ry="12" fill="#13c2c2" opacity="0.2"/>
  
  <!-- Smile - Friendly Curve -->
  <path d="M 85 100 Q 100 108 115 100" stroke="#722ed1" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Digital Lines - AI Feel -->
  <line x1="70" y1="75" x2="75" y2="75" stroke="#13c2c2" stroke-width="2" opacity="0.6"/>
  <line x1="125" y1="75" x2="130" y2="75" stroke="#13c2c2" stroke-width="2" opacity="0.6"/>
  
  <line x1="68" y1="82" x2="73" y2="82" stroke="#13c2c2" stroke-width="2" opacity="0.4"/>
  <line x1="127" y1="82" x2="132" y2="82" stroke="#13c2c2" stroke-width="2" opacity="0.4"/>
  
  <line x1="66" y1="89" x2="71" y2="89" stroke="#13c2c2" stroke-width="2" opacity="0.3"/>
  <line x1="129" y1="89" x2="134" y2="89" stroke="#13c2c2" stroke-width="2" opacity="0.3"/>
  
  <!-- Body - Geometric -->
  <path d="M 60 140 Q 100 130 140 140 L 150 180 Q 100 190 50 180 Z" fill="url(#faceGradient)"/>
  
  <!-- Collar/Neck -->
  <rect x="85" y="130" width="30" height="15" fill="url(#faceGradient)"/>
  
  <!-- Digital Badge/Logo -->
  <circle cx="100" cy="160" r="12" fill="#1890ff" opacity="0.8"/>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">A</text>
  
  <!-- Neural Network Pattern -->
  <g opacity="0.3">
    <!-- Left Side -->
    <circle cx="40" cy="100" r="3" fill="#13c2c2"/>
    <circle cx="45" cy="120" r="2" fill="#13c2c2"/>
    <circle cx="35" cy="130" r="2" fill="#13c2c2"/>
    <line x1="40" y1="100" x2="45" y2="120" stroke="#13c2c2" stroke-width="1"/>
    <line x1="45" y1="120" x2="35" y2="130" stroke="#13c2c2" stroke-width="1"/>
    
    <!-- Right Side -->
    <circle cx="160" cy="100" r="3" fill="#13c2c2"/>
    <circle cx="155" cy="120" r="2" fill="#13c2c2"/>
    <circle cx="165" cy="130" r="2" fill="#13c2c2"/>
    <line x1="160" y1="100" x2="155" y2="120" stroke="#13c2c2" stroke-width="1"/>
    <line x1="155" y1="120" x2="165" y2="130" stroke="#13c2c2" stroke-width="1"/>
  </g>
  
  <!-- Sparkles - AI Magic -->
  <g opacity="0.8">
    <path d="M 30 40 L 32 44 L 36 46 L 32 48 L 30 52 L 28 48 L 24 46 L 28 44 Z" fill="#ffd700"/>
    <path d="M 170 40 L 172 44 L 176 46 L 172 48 L 170 52 L 168 48 L 164 46 L 168 44 Z" fill="#ffd700"/>
    <path d="M 100 20 L 102 24 L 106 26 L 102 28 L 100 32 L 98 28 L 94 26 L 98 24 Z" fill="#ffd700"/>
  </g>
  
  <!-- Floating Particles -->
  <g opacity="0.4">
    <circle cx="50" cy="60" r="2" fill="#13c2c2"/>
    <circle cx="150" cy="65" r="2" fill="#13c2c2"/>
    <circle cx="60" cy="160" r="2" fill="#1890ff"/>
    <circle cx="140" cy="165" r="2" fill="#1890ff"/>
  </g>
</svg>
