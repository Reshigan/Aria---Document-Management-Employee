# ARIA ERP - Cloudflare Pages Deployment Configuration

name = "aria-erp"

# Build configuration for frontend-v2
[build]
command = "cd frontend-v2 && npm install && npm run build"
output_directory = "frontend-v2/dist"

# Environment variables for production
[env.production]
VITE_API_URL = "https://aria.vantax.co.za/api"
VITE_APP_NAME = "Aria ERP"
VITE_APP_VERSION = "2.0.0"

# Environment variables for preview
[env.preview]
VITE_API_URL = "https://aria.vantax.co.za/api"
VITE_APP_NAME = "Aria ERP (Preview)"
VITE_APP_VERSION = "2.0.0"