global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aria-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'aria-backend'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['backend:8000']
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
