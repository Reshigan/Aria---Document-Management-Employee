
name: quote_to_cash
description: Complete quote-to-cash workflow with approvals at each phase
version: 1
initial_state: collect_quote_data

states:
  collect_quote_data:
    type: conversation
    name: Collect Quote Data
    description: Gather customer and product information for quote
    next: create_quote_draft
  
  create_quote_draft:
    type: bot_task
    name: Create Quote Draft
    bot: quote_generation
    action: create_quote
    params:
      customer_id: $customer_id
      customer_name: $customer_name
      products: $products
      notes: $notes
    output_key: quote
    next: request_quote_approval
  
  request_quote_approval:
    type: human_approval
    name: Approve Quote
    approval_type: send_quote
    description: "Quote ${quote.quote_number} created for ${customer_name} - Total: ${quote.total_amount}. Approve to send?"
    approval_data_keys:
      - quote
      - customer_name
    approver_role: sales_manager
    on_approve: generate_quote_pdf
    on_reject: end_cancelled
  
  generate_quote_pdf:
    type: bot_task
    name: Generate Quote PDF
    bot: document_generation
    action: generate_pdf
    params:
      document_type: quote
      document_id: $quote.id
    output_key: quote_pdf
    next: send_quote_email
  
  send_quote_email:
    type: bot_task
    name: Send Quote Email
    bot: email_integration
    action: send_email
    params:
      to: $customer_email
      subject: "Quote ${quote.quote_number} from ${company_name}"
      body: "Please find attached your quote ${quote.quote_number}."
      attachments:
        - $quote_pdf
    output_key: email_sent
    next: wait_for_po
  
  wait_for_po:
    type: wait_event
    name: Wait for Purchase Order
    event_type: po_received
    description: Waiting for customer to send purchase order
    output_key: po_data
    next: request_sales_order_approval
  
  request_sales_order_approval:
    type: human_approval
    name: Approve Sales Order Creation
    approval_type: create_sales_order
    description: "PO ${po_data.po_number} received. Create sales order?"
    approval_data_keys:
      - po_data
      - quote
    approver_role: sales_manager
    on_approve: create_sales_order
    on_reject: end_cancelled
  
  create_sales_order:
    type: bot_task
    name: Create Sales Order
    bot: sales_order
    action: create_sales_order
    params:
      quote_id: $quote.id
      po_number: $po_data.po_number
      customer_id: $customer_id
    output_key: sales_order
    next: create_pick_slip
  
  create_pick_slip:
    type: bot_task
    name: Create Pick Slip
    bot: warehouse_management
    action: create_pick_slip
    params:
      sales_order_id: $sales_order.id
    output_key: pick_slip
    next: create_delivery_note
  
  create_delivery_note:
    type: bot_task
    name: Create Delivery Note
    bot: shipping
    action: create_delivery_note
    params:
      sales_order_id: $sales_order.id
      pick_slip_id: $pick_slip.id
    output_key: delivery_note
    next: generate_delivery_documents
  
  generate_delivery_documents:
    type: bot_task
    name: Generate Delivery Documents
    bot: document_generation
    action: generate_pdf
    params:
      document_type: delivery_note
      document_id: $delivery_note.id
    output_key: delivery_pdf
    next: request_delivery_approval
  
  request_delivery_approval:
    type: human_approval
    name: Approve Delivery
    approval_type: dispatch_delivery
    description: "Sales Order ${sales_order.order_number} ready for delivery. Approve dispatch?"
    approval_data_keys:
      - sales_order
      - delivery_note
    approver_role: warehouse_manager
    on_approve: wait_for_delivery_confirmation
    on_reject: end_cancelled
  
  wait_for_delivery_confirmation:
    type: wait_event
    name: Wait for Delivery Confirmation
    event_type: delivery_confirmed
    description: Waiting for delivery confirmation from customer
    output_key: delivery_confirmation
    next: request_invoice_approval
  
  request_invoice_approval:
    type: human_approval
    name: Approve Invoice Creation
    approval_type: create_invoice
    description: "Delivery confirmed for SO ${sales_order.order_number}. Create invoice?"
    approval_data_keys:
      - sales_order
      - delivery_confirmation
    approver_role: finance_manager
    on_approve: create_invoice
    on_reject: end_cancelled
  
  create_invoice:
    type: bot_task
    name: Create Invoice
    bot: invoice_processing
    action: create_invoice
    params:
      sales_order_id: $sales_order.id
      delivery_note_id: $delivery_note.id
    output_key: invoice
    next: generate_invoice_pdf
  
  generate_invoice_pdf:
    type: bot_task
    name: Generate Invoice PDF
    bot: document_generation
    action: generate_pdf
    params:
      document_type: invoice
      document_id: $invoice.id
    output_key: invoice_pdf
    next: request_send_invoice_approval
  
  request_send_invoice_approval:
    type: human_approval
    name: Approve Send Invoice
    approval_type: send_invoice
    description: "Invoice ${invoice.invoice_number} created - Total: ${invoice.total_amount}. Approve to send?"
    approval_data_keys:
      - invoice
      - customer_name
    approver_role: finance_manager
    on_approve: send_invoice_email
    on_reject: end_cancelled
  
  send_invoice_email:
    type: bot_task
    name: Send Invoice Email
    bot: email_integration
    action: send_email
    params:
      to: $customer_email
      subject: "Invoice ${invoice.invoice_number} from ${company_name}"
      body: "Please find attached invoice ${invoice.invoice_number} for your order."
      attachments:
        - $invoice_pdf
    output_key: invoice_email_sent
    next: end_completed
  
  end_completed:
    type: end
    name: Workflow Completed
    description: Quote-to-cash process completed successfully
  
  end_cancelled:
    type: end
    name: Workflow Cancelled
    description: Workflow was cancelled by user

correlation_keys:
  - quote_id
  - sales_order_id
  - customer_id
  - po_number

approval_matrix:
  send_quote:
    roles:
      - sales_manager
      - sales_director
    amount_threshold: 100000
  
  create_sales_order:
    roles:
      - sales_manager
      - sales_director
    amount_threshold: 100000
  
  dispatch_delivery:
    roles:
      - warehouse_manager
      - operations_manager
  
  create_invoice:
    roles:
      - finance_manager
      - finance_director
    amount_threshold: 100000
  
  send_invoice:
    roles:
      - finance_manager
      - finance_director
    amount_threshold: 100000

timeouts:
  wait_for_po: 30d  # 30 days to receive PO
  wait_for_delivery_confirmation: 7d  # 7 days for delivery confirmation
  approval_default: 48h  # 48 hours for approvals
