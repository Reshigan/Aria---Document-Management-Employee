name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Backend: Deploy Workers API ──────────────────────────────────
  deploy-backend:
    name: Deploy Workers API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./workers-api
        run: npm ci --no-audit --no-fund

      - name: TypeScript type check
        working-directory: ./workers-api
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare Workers
        working-directory: ./workers-api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Database: Run Migrations ─────────────────────────────────────
  deploy-db:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Apply migrations
        working-directory: ./workers-api
        run: |
          echo "Applying D1 migrations..."
          for file in migrations/*.sql; do
            echo "Running: $file"
            npx wrangler d1 execute aria-erp-db --remote --file="$file" --yes || true
          done
          echo "All migrations applied"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Frontend: Build & Deploy to Cloudflare Pages ─────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend-v2
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: ./frontend-v2
        run: npm run build
        env:
          VITE_API_URL: https://aria-api.reshigan-085.workers.dev

      - name: Deploy to Cloudflare Pages
        working-directory: ./frontend-v2
        run: npx wrangler pages deploy dist --project-name=aria-erp --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Post-Deploy Validation ───────────────────────────────────────
  validate:
    name: Post-Deploy Validation
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Health check - Backend API
        run: |
          echo "Checking backend health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aria-api.reshigan-085.workers.dev/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backend health check returned $STATUS"
          else
            echo "Backend API is healthy"
          fi

      - name: Health check - Frontend
        run: |
          echo "Checking frontend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aria-erp.pages.dev)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "304" ]; then
            echo "::warning::Frontend returned $STATUS"
          else
            echo "Frontend is serving correctly"
          fi
