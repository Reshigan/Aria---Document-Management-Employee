name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

env:
  NODE_VERSION: '20'

jobs:
  # ── Backend: Deploy Workers API ──────────────────────────────────
  deploy-backend:
    name: Deploy Workers API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./workers-api
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        working-directory: ./workers-api
        run: npx tsc --noEmit

      - name: Build backend
        working-directory: ./workers-api
        run: npm run build

      - name: Deploy to Cloudflare Workers
        working-directory: ./workers-api
        run: |
          echo "Deploying Workers API..."
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        
      - name: Backend deployment summary
        run: |
          echo "✅ Workers API deployed successfully"
          echo "API endpoint: https://aria-api.reshigan-085.workers.dev"

  # ── Database: Run Migrations ─────────────────────────────────────
  deploy-db:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./workers-api
        run: npm install --no-audit --no-fund

      - name: Apply migrations
        working-directory: ./workers-api
        run: |
          echo "Applying D1 migrations..."
          for file in migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "Running migration: $(basename "$file")"
              npx wrangler d1 execute aria-erp-db --remote --file="$file" --yes || {
                echo "::warning::Migration $(basename "$file") failed, continuing with next migration..."
              }
            fi
          done
          echo "✅ All migrations processed"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Frontend: Build & Deploy to Cloudflare Pages ─────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend-v2
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: ./frontend-v2
        run: npm run build
        env:
          VITE_API_URL: https://aria-api.reshigan-085.workers.dev

      - name: Deploy to Cloudflare Pages
        working-directory: ./frontend-v2
        run: |
          echo "Deploying frontend to Cloudflare Pages..."
          npx wrangler pages deploy dist --project-name=aria-erp --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Frontend deployment summary
        run: |
          echo "✅ Frontend deployed successfully"
          echo "Frontend URL: https://aria-erp.pages.dev"

  # ── Post-Deploy Validation ───────────────────────────────────────
  validate:
    name: Post-Deploy Validation
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Health check - Backend API
        run: |
          echo "🔍 Checking backend health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aria-api.reshigan-085.workers.dev/api/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend API is healthy (HTTP $STATUS)"
          else
            echo "::warning:: Backend health check returned HTTP $STATUS"
          fi

      - name: Health check - Frontend
        run: |
          echo "🔍 Checking frontend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aria-erp.pages.dev || echo "000")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
            echo "✅ Frontend is serving correctly (HTTP $STATUS)"
          else
            echo "::warning:: Frontend returned HTTP $STATUS"
          fi
      
      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **ARIA ERP Deployment Completed Successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Workers API | ✅ Deployed | https://aria-api.reshigan-085.workers.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ✅ Deployed | https://aria-erp.pages.dev |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Application is now live!**" >> $GITHUB_STEP_SUMMARY
