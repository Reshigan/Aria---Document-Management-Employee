name: Production CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Print Node and npm versions
        working-directory: ./frontend
        run: |
          node -v
          npm -v
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --no-audit --no-fund
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Print Python and pip versions
        working-directory: ./backend
        run: |
          python --version
          pip --version
      
      - name: Run backend checks
        working-directory: ./backend
        run: |
          python -m py_compile production_main.py
          echo "Backend syntax check passed"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    if: success()
    steps:
      - name: Success notification
        run: |
          echo "✅ All checks passed! Ready for production deployment."
          echo "Frontend build: SUCCESS"
          echo "Backend tests: SUCCESS"
