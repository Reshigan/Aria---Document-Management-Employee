name: CI

on:
  push:
    branches: [main, 'devin/**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Backend: Type Check ──────────────────────────────────────────
  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./workers-api
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        working-directory: ./workers-api
        run: npx tsc --noEmit

  # ── Backend: Unit Tests ──────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./workers-api
        run: npm install --no-audit --no-fund

      - name: Run tests
        working-directory: ./workers-api
        run: npm run test
        continue-on-error: true

  # ── Frontend: Build & Lint ───────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend-v2
        run: npm ci --no-audit --no-fund

      - name: TypeScript lint
        working-directory: ./frontend-v2
        run: npm run lint

      - name: Build
        working-directory: ./frontend-v2
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-v2/dist
          retention-days: 7

  # ── Security Scan ────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets in workers-api/src and frontend-v2/src..."
          FOUND=0
          # Only scan active source directories (not legacy frontend/)
          for DIR in workers-api/src frontend-v2/src; do
            if [ -d "$DIR" ]; then
              if grep -rn 'password123\|secret123\|hardcoded_secret' \
                --include='*.ts' --include='*.tsx' \
                "$DIR" 2>/dev/null \
                | grep -v '\.test\.' | grep -v '__tests__' | head -20; then
                echo "::error::Hardcoded credentials found in $DIR"
                FOUND=1
              fi
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No hardcoded secrets found"

      - name: Check for sensitive files
        run: |
          SENSITIVE=".env .env.local .env.production admin_token.txt secrets.json credentials.json"
          for f in $SENSITIVE; do
            if find . -name "$f" -not -path "./.git/*" -not -path "*/node_modules/*" 2>/dev/null | grep -q .; then
              echo "::error::Sensitive file committed: $f"
              exit 1
            fi
          done
          echo "No sensitive files found"

  # ── Summary ──────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [backend-typecheck, backend-tests, frontend-build, security-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Type Check | ${{ needs.backend-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any required job failed (backend-tests is allowed to fail)
          if [ "${{ needs.backend-typecheck.result }}" = "failure" ] || \
             [ "${{ needs.frontend-build.result }}" = "failure" ] || \
             [ "${{ needs.security-scan.result }}" = "failure" ]; then
            echo "::error::Required CI checks failed"
            exit 1
          fi
          echo "All required checks passed"
