name: CI

on:
  push:
    branches: [main, 'devin/**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Backend: Type Check ──────────────────────────────────────────
  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./workers-api
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        working-directory: ./workers-api
        run: npx tsc --noEmit

  # ── Backend: Unit Tests ──────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./workers-api
        run: npm install --no-audit --no-fund

      - name: Start dev server in background
        working-directory: ./workers-api
        run: |
          npm run dev > server.log 2>&1 &
          echo "Waiting for server to start..."
          # Wait for server to be ready by checking if port 8787 is listening
          timeout=30
          while [ $timeout -gt 0 ]; do
            if curl -s http://localhost:8787 > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            sleep 1
            timeout=$((timeout - 1))
          done
          if [ $timeout -eq 0 ]; then
            echo "Server failed to start within 30 seconds"
            cat server.log
            exit 1
          fi

      - name: Run tests
        working-directory: ./workers-api
        run: npm run test
        continue-on-error: true

  # ── Frontend: Build & Lint ───────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend-v2
        run: npm ci --no-audit --no-fund

      - name: TypeScript lint
        working-directory: ./frontend-v2
        run: npm run lint

      - name: Build
        working-directory: ./frontend-v2
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-v2/dist
          retention-days: 7

  # ── Security Scan ────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive files
        run: |
          echo "Checking for sensitive files that should not be committed..."
          SENSITIVE=".env .env.local .env.production admin_token.txt secrets.json credentials.json"
          FOUND=0
          for f in $SENSITIVE; do
            MATCHES=$(find . -name "$f" -not -path "./.git/*" -not -path "*/node_modules/*" 2>/dev/null)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Sensitive file found: $f"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Sensitive files should not be committed to the repository"
            exit 1
          fi
          echo "No sensitive files found"

  # ── Summary ──────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [backend-typecheck, backend-tests, frontend-build, security-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Type Check | ${{ needs.backend-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any required job failed (backend-tests is allowed to fail)
          if [ "${{ needs.backend-typecheck.result }}" = "failure" ] || \
             [ "${{ needs.frontend-build.result }}" = "failure" ]; then
            echo "::error::Required CI checks failed"
            exit 1
          fi
          echo "All required checks passed"
