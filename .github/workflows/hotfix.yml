name: Hotfix Deployment

on:
  push:
    branches: [ hotfix/* ]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Quick validation for hotfixes
  validate-hotfix:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Quick backend validation
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt || pip install -r requirements-minimal.txt
        python -c "import main; print('Backend imports OK')"

    - name: Quick frontend validation
      run: |
        cd frontend
        npm ci
        npm run build

  # Emergency deployment to production
  emergency-deploy:
    needs: [validate-hotfix]
    runs-on: ubuntu-latest
    environment: production
    if: contains(github.event.head_commit.message, '[EMERGENCY]')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

    - name: Emergency deployment
      env:
        PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
        PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
      run: |
        ssh -o StrictHostKeyChecking=no $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
          set -e
          
          echo "🚨 EMERGENCY HOTFIX DEPLOYMENT STARTED 🚨"
          
          # Navigate to application directory
          cd /home/ubuntu/ARIA || cd /opt/aria || cd ~/aria
          
          # Create backup
          git stash push -m "Pre-hotfix backup $(date)"
          
          # Pull hotfix
          git pull origin ${{ github.ref_name }}
          
          # Quick restart
          pm2 restart aria-backend aria-frontend
          
          # Health check
          sleep 15
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3000 || exit 1
          
          echo "🚨 EMERGENCY HOTFIX DEPLOYMENT COMPLETED 🚨"
        EOF

    - name: Notify emergency deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#critical-alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        text: "🚨 EMERGENCY HOTFIX DEPLOYED 🚨"
        fields: repo,message,commit,author