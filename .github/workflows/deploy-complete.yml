name: Complete Cloudflare Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      run_migrations:
        description: 'Run database migrations'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  # ── Complete Deployment ───────────────────────────────────────────
  deploy-complete:
    name: Complete Cloudflare Deployment
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: ./workers-api
        run: npm install --no-audit --no-fund

      - name: Install frontend dependencies
        working-directory: ./frontend-v2
        run: npm install --no-audit --no-fund

      - name: Build backend
        working-directory: ./workers-api
        run: npm run build

      - name: Deploy Workers API
        working-directory: ./workers-api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run database migrations
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        working-directory: ./workers-api
        run: |
          echo "Applying D1 migrations..."
          for file in migrations/*.sql; do
            echo "Running: $file"
            npx wrangler d1 execute aria-erp-db --remote --file="$file" --yes || echo "Migration failed for $file, continuing..."
          done
          echo "All migrations applied"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build frontend
        working-directory: ./frontend-v2
        run: npm run build
        env:
          VITE_API_URL: ${{ github.event.inputs.environment == 'production' && 'https://aria-api.reshigan-085.workers.dev' || 'https://aria-api-dev.reshigan-085.workers.dev' }}

      - name: Deploy Frontend to Cloudflare Pages
        working-directory: ./frontend-v2
        run: npx wrangler pages deploy dist --project-name=aria-erp --branch=${{ github.event.inputs.environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-deploy validation
        run: |
          echo "Checking deployment health..."
          
          BACKEND_URL="${{ github.event.inputs.environment == 'production' && 'https://aria-api.reshigan-085.workers.dev' || 'https://aria-api-dev.reshigan-085.workers.dev' }}"
          FRONTEND_URL="${{ github.event.inputs.environment == 'production' && 'https://aria-erp.pages.dev' || 'https://aria-erp-staging.pages.dev' }}"
          
          echo "Testing backend API..."
          if curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/health" | grep -q "200"; then
            echo "✅ Backend API is healthy"
          else
            echo "⚠️ Backend health check failed"
          fi
          
          echo "Testing frontend availability..."
          if curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL" | grep -q "200\|304"; then
            echo "✅ Frontend is accessible"
          else
            echo "⚠️ Frontend accessibility check failed"
          fi

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Workers API | ✅ Deployed | ${{ github.event.inputs.environment == 'production' && 'https://aria-api.reshigan-085.workers.dev' || 'https://aria-api-dev.reshigan-085.workers.dev' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ✅ Deployed | ${{ github.event.inputs.environment == 'production' && 'https://aria-erp.pages.dev' || 'https://aria-erp-staging.pages.dev' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployment completed successfully! 🎉"
