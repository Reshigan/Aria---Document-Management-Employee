version: '3.8'

services:
  # ARIA Backend Production Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aria-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - UPLOAD_DIRECTORY=/app/uploads
      - DATABASE_URL=sqlite:///./aria.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - ALLOWED_ORIGINS=["https://aria.vantax.co.za","http://localhost:3000"]
    volumes:
      - aria-uploads:/app/uploads
      - aria-db:/app
    restart: unless-stopped
    networks:
      - aria-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ARIA Frontend Production Service (using pre-built .next)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.simple
    container_name: aria-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - aria-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx Reverse Proxy for SSL termination
  nginx:
    image: nginx:alpine
    container_name: aria-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.vantax.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - aria-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  aria-uploads:
    driver: local
  aria-db:
    driver: local

networks:
  aria-network:
    driver: bridge
