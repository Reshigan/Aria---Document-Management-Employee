      - "Barcode and QR code scanning"
      - "Image preprocessing (deskew, denoise, enhance)"
      - "PDF generation with searchable text layer"
      - "Batch processing (100+ documents per run)"
      - "Integration with Document Management System"
    
    integrations:
      - "Azure AI Vision (OCR)"
      - "Google Cloud Vision API (backup)"
      - "Tesseract OCR (offline fallback)"
      - "Email Bot (receive attachments)"
      - "File storage (Azure Blob, AWS S3)"
    
